{% extends 'base.html' %}

{% block title %}Login - PetStory{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar
                </h2>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Usuário</label>
                        <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Senha</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        Entrar
                    </button>
                </form>
                
                <div class="text-center">
                    <p class="mb-0">Não tem uma conta? <a href="{% url 'users:register' %}">Criar conta</a></p>
                    <p class="mt-2"><a href="{% url 'users:landing' %}">Voltar para a página inicial</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
