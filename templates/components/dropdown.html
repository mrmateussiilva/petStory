{% comment %}
Componente de Dropdown Estilizado
Uso: {% include 'components/dropdown.html' with name="style" label="Qual emoção você quer transmitir?" options=style_options %}
{% endcomment %}
<div class="mb-6">
    <label for="{{ name }}" class="block text-sm font-semibold text-gray-700 mb-2">
        {% if icon %}
            <i class="{{ icon }} mr-2"></i>
        {% endif %}
        {{ label }}
    </label>
    <select 
        name="{{ name }}" 
        id="{{ name }}" 
        {% if required %}required{% endif %}
        class="w-full px-6 py-4 rounded-2xl border-2 border-gray-200 focus:border-purple-400 focus:ring-4 focus:ring-purple-100 outline-none transition-all duration-300 text-gray-800 bg-white"
    >
        {% if placeholder %}
            <option value="">{{ placeholder }}</option>
        {% endif %}
        {% for option in options %}
            <option value="{{ option.value }}" {% if option.selected %}selected{% endif %}>
                {{ option.text }}
            </option>
        {% endfor %}
    </select>
    {% if help_text %}
        <p class="text-sm text-gray-500 mt-2">{{ help_text }}</p>
    {% endif %}
</div>
